name: Documentation

on:
  pull_request:
    paths:
      - "docs/**"
      - "zensical.toml"
  push:
    branches:
      - master
    paths:
      - "docs/**"
      - "zensical.toml"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Install Zensical
        run: uv tool install zensical

      - name: Build docs
        run: zensical build

      - uses: actions/upload-artifact@v7
        with:
          name: docs-site
          path: site/

  deploy-preview:
    if: github.event_name == 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: docs-site
          path: site/

      - name: Deploy to Cloudflare Pages (preview)
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site/ --project-name=griddy-docs --branch=${{ github.head_ref }}

      - name: Comment preview URL on PR
        env:
          GH_TOKEN: ${{ github.token }}
          DEPLOY_TOKEN: ${{ steps.deploy.outputs.deployment-url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: bash scripts/comment-preview-url.sh

  deploy-production:
    if: github.event_name == 'push' && github.ref == 'refs/head/master'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: docs-dite
          path: site/
      - name: Deploy to Cloudflare Pages (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site/ --project-name=griddy-docs --branch=master
