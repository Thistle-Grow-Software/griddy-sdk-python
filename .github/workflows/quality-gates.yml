name: Quality Gates

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  id-token: write
  contents: write

jobs:
  quality-gates:
    uses: Thistle-Grow-Software/.github/.github/workflows/python-quality-gates.yml@main
    with:
      test-marker: "unit"
      codecov-enabled: true
      codecov-slug: "Thistle-Grow-Software/griddy-sdk-python"
    secrets:
      codecov-token: ${{ secrets.CODECOV_TOKEN }}

  pyright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Install dependencies
        run: uv sync --all-groups
      - name: Verify type completeness
        run: uv run pyright --verifytypes griddy
        continue-on-error: true

  release:
    if: github.ref == 'refs/heads/master'
    needs: [quality-gates, pyright]
    uses: Thistle-Grow-Software/.github/.github/workflows/create-release.yml@main
