openapi: "3.1.0"
info:
  title: "NFL Next Gen Stats Statistics API"
  version: "1.0.0"
  description: >-
    Reverse-engineered specification for the NFL Next Gen Stats Statistics API.
    This spec was derived from the Griddy SDK implementation and may be
    incomplete. The NFL.com API is undocumented and subject to change
    without notice.
servers:
  - url: https://nextgenstats.nfl.com
    description: NFL Next Gen Stats API
components:
  schemas:
    SeasonType:
      type: string
      enum: ["REG", "PRE", "POST"]
    NgsPassingStatsResponse:
      type: object
      properties:
        season:
          type: integer
          description: Season year.
        seasonType:
          type: string
          description: Season type.
        filter:
          type: string
          description: Active filter description.
        threshold:
          type: number
          description: Minimum qualifying threshold.
        stats:
          type: array
          items:
            type: object
          description: Array of passing stat objects.
    NgsReceivingStatsResponse:
      type: object
      properties:
        season:
          type: integer
          description: Season year.
        seasonType:
          type: string
          description: Season type.
        filter:
          type: string
          description: Active filter description.
        threshold:
          type: number
          description: Minimum qualifying threshold.
        stats:
          type: array
          items:
            type: object
          description: Array of receiving stat objects.
    NgsRushingStatsResponse:
      type: object
      properties:
        season:
          type: integer
          description: Season year.
        seasonType:
          type: string
          description: Season type.
        filter:
          type: string
          description: Active filter description.
        threshold:
          type: number
          description: Minimum qualifying threshold.
        stats:
          type: array
          items:
            type: object
          description: Array of rushing stat objects.
  responses:
    Unauthorized:
      description: Authentication required or token expired.
    NotFound:
      description: The requested resource was not found.
    RateLimited:
      description: Rate limit exceeded.
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
security:
  - bearerAuth: []
paths:
  /api/statboard/passing:
    get:
      operationId: getNgsPassingStats
      summary: Get NGS passing statistics.
      description: >-
        Returns detailed passing statistics including time to throw,
        air yards, completion probability, and more.
      parameters:
        - name: season
          in: query
          required: true
          description: The season year (e.g., 2025).
          schema:
            type: integer
        - name: seasonType
          in: query
          required: true
          description: Season type (REG, PRE, POST).
          schema:
            $ref: "#/components/schemas/SeasonType"
        - name: week
          in: query
          required: false
          description: Optional week filter.
          schema:
            type: integer
      responses:
        "200":
          description: Passing statistics.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NgsPassingStatsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
  /api/statboard/receiving:
    get:
      operationId: getNgsReceivingStats
      summary: Get NGS receiving statistics.
      description: >-
        Returns detailed receiving statistics including separation,
        cushion, YAC over expectation, and more.
      parameters:
        - name: season
          in: query
          required: true
          description: The season year (e.g., 2025).
          schema:
            type: integer
        - name: seasonType
          in: query
          required: true
          description: Season type (REG, PRE, POST).
          schema:
            $ref: "#/components/schemas/SeasonType"
        - name: week
          in: query
          required: false
          description: Optional week filter.
          schema:
            type: integer
      responses:
        "200":
          description: Receiving statistics.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NgsReceivingStatsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
  /api/statboard/rushing:
    get:
      operationId: getNgsRushingStats
      summary: Get NGS rushing statistics.
      description: >-
        Returns detailed rushing statistics including time to LOS,
        rush yards over expected, efficiency, and more.
      parameters:
        - name: season
          in: query
          required: true
          description: The season year (e.g., 2025).
          schema:
            type: integer
        - name: seasonType
          in: query
          required: true
          description: Season type (REG, PRE, POST).
          schema:
            $ref: "#/components/schemas/SeasonType"
        - name: week
          in: query
          required: false
          description: Optional week filter.
          schema:
            type: integer
      responses:
        "200":
          description: Rushing statistics.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NgsRushingStatsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
