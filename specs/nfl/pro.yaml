          in: query
          required: false
          schema:
            type: array
            items:
              type: string
              enum: ["QB", "RB", "WR", "TE", "SPEC"]
          description: Filter by position groups.
        - name: teamOffense
          in: query
          required: false
          schema:
            type: string
          description: Filter by specific offensive team ID.
        - name: teamDefense
          in: query
          required: false
          schema:
            type: string
          description: Filter by specific defensive team ID (opponent analysis).
        - name: minOffensiveSnaps
          in: query
          required: false
          schema:
            type: integer
