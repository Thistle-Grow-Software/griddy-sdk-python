openapi: "3.1.0"
info:
  title: "NFL.com Pro API"
  version: "1.0.0"
  description: >-
    Reverse-engineered specification for the NFL.com Pro API. Covers betting,
    content, games, players, schedules, stats, teams, and transactions
    endpoints. This spec was derived from the Griddy SDK implementation and may
    be incomplete. The NFL.com API is undocumented and subject to change without
    notice. All endpoints under /api/secured/* require NFL Pro Access.
servers:
  - url: https://pro.nfl.com
    description: NFL Pro API

# =============================================================================
# Paths
# =============================================================================
paths:

  # ---------------------------------------------------------------------------
  # Betting
  # ---------------------------------------------------------------------------
  /api/schedules/week/odds:
    get:
      operationId: getWeeklyBettingOdds
      summary: Get Weekly Betting Odds
      description: >-
        Retrieves comprehensive betting odds for all games in a specified week.
        Returns point spreads, money lines, and totals (over/under) for each
        game with the latest odds updates from betting markets.
      parameters:
        - name: season
          in: query
          required: true
          schema:
            type: integer
          description: Season year.
        - name: seasonType
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/SeasonType"
          description: Type of season.
        - name: week
          in: query
          required: true
          schema:
            type: integer
          description: Week number within the season.
      responses:
        "200":
          description: Betting odds for all games in the specified week.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyOddsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/schedules/genius/future/odds:
    get:
      operationId: getFutureBettingOdds
      summary: Get Future Betting Odds
      description: >-
        Retrieves comprehensive betting futures data including Super Bowl odds,
        conference championship odds, and division winner odds for all teams.
        Returns decimal odds for each selection along with availability status.
      responses:
        "200":
          description: Betting futures data across multiple market hierarchies.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FuturesOddsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  # ---------------------------------------------------------------------------
  # Content
  # ---------------------------------------------------------------------------
  /api/content/home-film-cards:
    get:
      operationId: getHomeFilmCards
      summary: Get Home Film Cards
      description: >-
        Retrieves featured film room content cards for the home page.
        Returns weekly playlists and featured player film breakdowns.
      responses:
        "200":
          description: Featured film room content cards.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HomeFilmCardsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/content/insights/season:
    get:
      operationId: getSeasonContentInsights
      summary: Get Season Content Insights
      description: >-
        Retrieves curated editorial insights and analytics content for NFL
        players during a specified season. Returns expert commentary combining
        Next Gen Stats data with editorial analysis, including pregame previews,
        postgame breakdowns, fantasy insights, and evergreen content.
      parameters:
        - name: season
          in: query
          required: true
          schema:
            type: integer
          description: Season year.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
          description: Maximum number of insights to return.
        - name: tags
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: Content tags to filter by (supports multiple comma-separated tags).
        - name: teamId
          in: query
          required: false
          schema:
            type: string
          description: Filter by specific team identifier.
        - name: nflId
          in: query
          required: false
          schema:
            type: string
          description: Filter by specific player NFL identifier.
      responses:
        "200":
          description: Curated editorial insights for the specified season.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Insight"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/content/insights/game:
    get:
      operationId: getGameInsights
      summary: Get Game-Specific Insights
      description: >-
        Retrieves analytical insights and advanced statistics for a specific
        game. Can filter by tags and exclude specific content types.
      parameters:
        - name: season
          in: query
          required: true
          schema:
            type: integer
          description: Season year.
        - name: fapiGameId
          in: query
          required: true
          schema:
            type: string
            format: uuid
          description: FAPI Game identifier (UUID).
        - name: awayTeamId
          in: query
          required: true
          schema:
            type: string
          description: Away team identifier.
        - name: homeTeamId
          in: query
          required: true
          schema:
            type: string
          description: Home team identifier.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
          description: Maximum number of insights to return.
        - name: tags
          in: query
          required: false
          schema:
            type: string
          description: Comma-separated list of tags to filter by.
        - name: excludeTags
          in: query
          required: false
          schema:
            type: string
          description: Comma-separated list of tags to exclude.
      responses:
        "200":
          description: Analytical insights for the specified game.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GameInsight"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/content/game/preview:
    get:
      operationId: getGamePreview
      summary: Get Game Preview Content
      description: >-
        Retrieves preview content and insights for a specific game based on
        teams and week. Returns preview information, matchup analysis, and
        key storylines.
      parameters:
        - name: season
          in: query
          required: true
          schema:
            type: integer
          description: Season year.
        - name: seasonType
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/SeasonType"
          description: Type of season.
        - name: week
          in: query
          required: true
          schema:
            type: integer
          description: Week number.
        - name: visitorDisplayName
          in: query
          required: true
          schema:
            type: string
          description: Visiting team display name.
        - name: homeDisplayName
          in: query
          required: true
          schema:
            type: string
          description: Home team display name.
      responses:
        "200":
          description: Preview content and matchup analysis for the game.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GamePreviewResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/secured/videos/filmroom/plays:
    get:
      operationId: getFilmroomPlays
      summary: Get Filmroom Plays
      description: >-
        Retrieves detailed play-by-play data with extensive filtering
        capabilities for film study. Returns comprehensive play information
        including formations, personnel packages, game situations, and detailed
        play descriptions. Requires NFL Pro Access.
      parameters:
        - name: gameId
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: Filter by specific game IDs.
        - name: weekSlug
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: Filter by week identifier.
        - name: season
          in: query
          required: false
          schema:
            type: array
            items:
              type: integer
          description: Filter by season year.
        - name: seasonType
          in: query
          required: false
          schema:
            type: array
            items:
              $ref: "#/components/schemas/SeasonType"
          description: Filter by season type.
        - name: nflId
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: Filter by player NFL ID.
        - name: quarter
          in: query
          required: false
          schema:
            type: array
            items:
              type: integer
          description: Filter by quarter.
        - name: down
          in: query
          required: false
          schema:
            type: array
            items:
              type: integer
          description: Filter by down.
        - name: yardsToGoType
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: Filter by yards to go category.
        - name: touchdown
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
              enum: ["0", "1"]
          description: Filter for touchdown plays (1 = yes, 0 = no).
        - name: rush10PlusYards
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
              enum: ["0", "1"]
          description: Filter for rushing plays of 10+ yards.
        - name: fumbleLost
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
              enum: ["0", "1"]
          description: Filter for plays with fumbles lost.
        - name: fumble
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
              enum: ["0", "1"]
          description: Filter for plays with fumbles.
        - name: qbAlignment
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: Filter by quarterback alignment.
        - name: redzone
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
              enum: ["0", "1"]
          description: Filter for red zone plays.
        - name: goalToGo
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
              enum: ["0", "1"]
          description: Filter for goal-to-go situations.
        - name: passPlay
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
              enum: ["0", "1"]
          description: Filter for passing plays.
        - name: runPlay
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
              enum: ["0", "1"]
          description: Filter for running plays.
        - name: playType
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: Filter by specific play types.
        - name: attempt
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
              enum: ["0", "1"]
          description: Filter for passing attempts.
        - name: completion
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
              enum: ["0", "1"]
          description: Filter for completed passes.
        - name: interception
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
              enum: ["0", "1"]
          description: Filter for interceptions.
        - name: reception
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
              enum: ["0", "1"]
          description: Filter for receptions.
        - name: sack
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
              enum: ["0", "1"]
          description: Filter for sacks.
        - name: recMotion
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
              enum: ["0", "1"]
          description: Filter by receiver motion.
        - name: targetLocation
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: Filter by target location on field.
        - name: airYardType
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: Filter by air yards category.
        - name: dropbackTimeType
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: Filter by dropback time.
        - name: pressure
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
              enum: ["0", "1"]
          description: Filter by quarterback pressure.
        - name: blitz
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
              enum: ["0", "1"]
          description: Filter by defensive blitz.
        - name: playAction
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
              enum: ["0", "1"]
          description: Filter by play action usage.
        - name: rushDirection
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: Filter by rush direction.
        - name: runStuff
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
              enum: ["0", "1"]
          description: Filter for stuffed runs.
        - name: receiverAlignment
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: Filter by receiver alignment.
        - name: separationType
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: Filter by receiver separation.
        - name: personnel
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: Filter by defensive personnel package.
        - name: defendersInTheBoxType
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: Filter by defenders in the box.
        - name: defCoverageType
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: Filter by defensive coverage type.
      responses:
        "200":
          description: Play-by-play data matching the specified filters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FilmroomPlaysResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/secured/videos/coaches:
    get:
      operationId: getCoachesFilmVideos
      summary: Get Coaches Film Videos
      description: >-
        Retrieves premium coaches film video content for specified games and
        plays. Returns multiple camera angles (endzone, sideline, broadcast)
        for each play. Requires NFL Plus Premium subscription.
      parameters:
        - name: gameId
          in: query
          required: true
          schema:
            type: array
            items:
              type: string
              format: uuid
          description: Game identifiers (UUID format, supports multiple games).
        - name: playId
          in: query
          required: true
          schema:
            type: array
            items:
              type: string
          description: Play identifiers for specific plays within the games.
      responses:
        "200":
          description: Multi-angle coaches film video content for the specified plays.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoachesFilmResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  # ---------------------------------------------------------------------------
  # Games, Scores & Game Stats
  # ---------------------------------------------------------------------------
  /api/stats/gamecenter:
    get:
      operationId: getGamecenter
      summary: Get Gamecenter Statistics
      description: >-
        Retrieves advanced game statistics including passer zones, receiver
        separation, pass rush metrics, and performance leaders for a specific
        game.
      parameters:
        - name: gameId
          in: query
          required: true
          schema:
            type: string
          description: >-
            Game identifier (10-digit format YYYYMMDDNN). Note: this is not a
            UUID; use the numeric game ID returned by other endpoints.
      responses:
        "200":
          description: Advanced game statistics for the specified game.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GamecenterResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/scores/live/games:
    get:
      operationId: getLiveGameScores
      summary: Get Live Game Scores
      description: >-
        Retrieves real-time scores and game status for all games in a specified
        week. Updates frequently (15-second cache) during active games. Returns
        an empty array when no games are currently being played.
      parameters:
        - name: season
          in: query
          required: true
          schema:
            type: integer
          description: Season year.
        - name: seasonType
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/SeasonType"
          description: Type of season.
        - name: week
          in: query
          required: true
          schema:
            type: integer
          description: Week number.
      responses:
        "200":
          description: Real-time scores and game status for the specified week.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveScoresResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/stats/boxscore:
    get:
      operationId: getStatsBoxscore
      summary: Get Game Boxscore
      description: >-
        Retrieves comprehensive boxscore data for a specific game including
        team statistics, individual player statistics, and scoring summary.
        Returns empty arrays for future games.
      parameters:
        - name: gameId
          in: query
          required: true
          schema:
            type: string
          description: Game identifier (10-digit format YYYYMMDDNN).
      responses:
        "200":
          description: Comprehensive boxscore data for the specified game.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BoxscoreResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/secured/plays/playlist/game:
    get:
      operationId: getPlaylistGame
      summary: Get Game Playlist
      description: >-
        Retrieves the play playlist for a specific game. Requires NFL Pro
        Access.
      parameters:
        - name: gameId
          in: query
          required: true
          schema:
            type: string
          description: Game identifier (10-digit format YYYYMMDDNN).
      responses:
        "200":
          description: Playlist data for the specified game.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaylistResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/plays/summaryPlay:
    get:
      operationId: getSummaryPlay
      summary: Get Play Summary
      description: >-
        Retrieves detailed information about a specific play in a game
        including play description, statistics, involved players, win
        probability, and expected points.
      parameters:
        - name: gameId
          in: query
          required: true
          schema:
            type: string
            format: uuid
          description: Game identifier (UUID format).
        - name: playId
          in: query
          required: true
          schema:
            type: integer
          description: Play identifier within the game.
      responses:
        "200":
          description: Detailed information about the specified play.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaySummaryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/secured/plays/winProbability:
    get:
      operationId: getPlaysWinProbability
      summary: Get Game Win Probability by Plays
      description: >-
        Retrieves comprehensive win probability data for every play in
        specified games. Returns pre-game win probabilities and detailed
        play-by-play probability changes, including Win Probability Added
        (WPA) metrics. Requires NFL Pro Access.
      parameters:
        - name: gameId
          in: query
          required: true
          schema:
            type: string
          description: >-
            Game identifier(s) in 10-digit format (YYYYMMDDNN). Can be a
            single game ID or multiple game IDs for batch retrieval.
      responses:
        "200":
          description: Win probability data for every play in the specified games.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayWinProbabilityResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/secured/plays/winProbabilityMin:
    get:
      operationId: getWinProbabilityMin
      summary: Get Minimal Win Probability Data
      description: >-
        Retrieves minimal win probability data for specified games, including
        pregame win probabilities and play-by-play probability changes.
        Optimized data structure for performance. Requires NFL Pro Access.
      parameters:
        - name: fapiGameId
          in: query
          required: true
          schema:
            type: array
            items:
              type: string
              format: uuid
          description: Football API game identifiers (UUID format). Supports multiple game IDs.
      responses:
        "200":
          description: Minimal win probability data for the specified games.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WinProbabilityResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/schedules/game/matchup/rankings:
    get:
      operationId: getGameMatchupRankings
      summary: Get Game Matchup Rankings
      description: >-
        Retrieves comprehensive matchup rankings and statistical comparisons
        for both teams in a specific game. Returns offensive, defensive, and
        special teams rankings with Z-scores and advantage ratings.
      parameters:
        - name: gameId
          in: query
          required: true
          schema:
            type: string
          description: Game identifier (10-digit format YYYYMMDDNN).
      responses:
        "200":
          description: Matchup rankings and statistical comparisons for both teams.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchupRankingsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/stats/game/team-rankings:
    get:
      operationId: getGameTeamRankings
      summary: Get Team Rankings for Game
      description: >-
        Retrieves comprehensive statistical rankings for both teams in a
        specific game. Returns 300+ statistical categories with rankings for
        offensive, defensive, and special teams performance.
      parameters:
        - name: season
          in: query
          required: true
          schema:
            type: integer
          description: Season year.
        - name: seasonType
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/SeasonType"
          description: Type of season.
        - name: awayTeamId
          in: query
          required: true
          schema:
            type: string
            format: uuid
          description: Away team UUID.
        - name: homeTeamId
          in: query
          required: true
          schema:
            type: string
            format: uuid
          description: Home team UUID.
        - name: week
          in: query
          required: true
          schema:
            type: integer
          description: Week number.
      responses:
        "200":
          description: Statistical rankings for both teams.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamRankingsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/schedules/game/team/injuries:
    get:
      operationId: getTeamInjuries
      summary: Get Team Injuries for Game Week
      description: >-
        Retrieves injury report information for a specific team in a given
        week. Returns player injury status and details.
      parameters:
        - name: season
          in: query
          required: true
          schema:
            type: integer
          description: Season year.
        - name: seasonType
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/SeasonType"
          description: Type of season.
