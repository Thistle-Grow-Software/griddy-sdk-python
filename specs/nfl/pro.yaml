        - name: year
          in: query
          required: true
          schema:
            type: integer
          description: Year (four digits) to fetch transactions for.
        - name: teamId
          in: query
          required: false
          schema:
            type: string
          description: Team UUID string to filter by.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
          description: Maximum number of results.
      responses:
        "200":
          description: Recent player transactions for the specified period.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

# =============================================================================
# Components
# =============================================================================
components:
  parameters:
    Season:
      name: season
      in: query
      required: true
      schema:
        type: integer
      description: Season year.
    SeasonTypeParam:
      name: seasonType
      in: query
      required: true
      schema:
        $ref: "#/components/schemas/SeasonType"
      description: Type of season.
    Week:
      name: week
      in: query
      required: true
      schema:
        type: string
      description: Week identifier slug.
    Limit35:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 35
      description: Maximum number of results to return.
    Limit50:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 50
      description: Maximum number of results to return.
    Offset:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        default: 0
      description: Number of records to skip for pagination.
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        default: 1
      description: Page number for pagination.
    SortKey:
      name: sortKey
      in: query
      required: false
      schema:
        type: string
      description: Field to sort results by.
    SortValue:
      name: sortValue
      in: query
      required: false
      schema:
        $ref: "#/components/schemas/SortOrder"
      description: Sort direction.

  schemas:
    # Shared enums
    SeasonType:
      type: string
      enum: ["PRE", "REG", "POST"]
    SortOrder:
      type: string
      enum: ["ASC", "DESC"]

    # Betting
    WeeklyOddsResponse:
      type: object
      description: Contains betting odds for all games in a week.
      properties:
        games:
          type: array
          items:
            type: object
            description: Game with associated betting odds.
    FuturesOddsResponse:
      type: object
      description: Betting futures data across multiple market hierarchies.

    # Content
    HomeFilmCardsResponse:
      type: object
      description: Featured film room content cards for the home page.
    Insight:
      type: object
      description: Curated editorial insight combining NGS data with editorial analysis.
    GameInsight:
      type: object
      description: Analytical insight with advanced statistics for a game.
    GamePreviewResponse:
      type: object
      description: Game preview content with matchup analysis and storylines.
    FilmroomPlaysResponse:
      type: object
      description: Play-by-play data with formation and personnel details.
    CoachesFilmResponse:
      type: object
      description: Multi-angle coaches film video content.

    # Games, Scores & Game Stats
    GamecenterResponse:
      type: object
      description: Advanced game statistics including passer zones, separation, and pass rush metrics.
    LiveScoresResponse:
      type: object
      description: Real-time scores and game status for all games in a week.
    BoxscoreResponse:
      type: object
      description: Comprehensive boxscore data with team and player statistics.
    PlaylistResponse:
      type: object
      description: Play playlist data for a game.
    PlaySummaryResponse:
      type: object
      description: Detailed play information including statistics and win probability.
    PlayWinProbabilityResponse:
      type: object
      description: Comprehensive win probability data for every play in a game.
    WinProbabilityResponse:
      type: object
      description: Minimal win probability data optimized for performance.
    MatchupRankingsResponse:
      type: object
      description: Matchup rankings with Z-scores and advantage ratings.
    TeamRankingsResponse:
      type: object
      description: Comprehensive statistical rankings for both teams in a game.
    InjuryReportResponse:
      type: object
      description: Player injury status and details for a team.

    # Players
    PlayerDetail:
      type: object
      description: Detailed NFL player information.
    ProjectedStatsResponse:
      type: object
      description: Projected fantasy statistics in JSON:API format.
    PlayerSearchResponse:
      type: object
      description: List of players matching search criteria.

    # Schedules
    GamesResponse:
      type: object
      description: Collection of games for a specified week.
    CurrentGamesResponse:
      type: object
      description: Collection of games for the current week.
    StandingsResponse:
      type: object
      description: Team standings with division, conference, and overall records.
    SeasonWeeksResponse:
      type: object
