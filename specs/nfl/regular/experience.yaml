openapi: "3.1.0"
info:
  title: "NFL.com Experience API"
  version: "1.0.0"
  description: >-
    Reverse-engineered specification for the NFL.com Experience API.
    This spec was derived from the Griddy SDK implementation and may be
    incomplete. The NFL.com API is undocumented and subject to change
    without notice.
servers:
  - url: https://api.nfl.com
    description: NFL.com API
paths:
  /experience/v1/gamedetailsbyslug/{slug}:
    get:
      operationId: getGameDetailsBySlug
      summary: Get Game Details by Slug
      description: >-
        Retrieves detailed game information using a game slug identifier.
        Optionally includes replay videos.
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          description: Game slug identifier.
        - name: includeReplays
          in: query
          required: false
          schema:
            type: boolean
          description: Include replay videos in response.
      responses:
        "200":
          description: Successfully retrieved game details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyGameDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
  /experience/v2/gamedetails/{gameId}:
    get:
      operationId: getGameDetails
      summary: Get Game Details
      description: >-
        Retrieves detailed game information by game ID. Supports optional
        inclusion of drive chart, replays, standings, tagged videos, and summary.
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: string
          description: Game identifier (UUID).
        - name: includeDriveChart
          in: query
          required: false
          schema:
            type: boolean
          description: Include drive chart data in response.
        - name: includeReplays
          in: query
          required: false
          schema:
            type: boolean
          description: Include replay videos in response.
        - name: includeStandings
          in: query
          required: false
          schema:
            type: boolean
          description: Include standings data in response.
        - name: includeTaggedVideos
          in: query
          required: false
          schema:
            type: boolean
          description: Include tagged videos in response.
        - name: includeSummary
          in: query
          required: false
          schema:
            type: boolean
          description: Include game summary in response.
      responses:
        "200":
          description: Successfully retrieved game details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyGameDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
components:
  schemas:
    SeasonType:
      type: string
      enum: ["PRE", "REG", "POST"]
      description: Type of NFL season.
    WeeklyGameDetailStatus:
      type: string
      enum: ["SCHEDULED", "IN_PROGRESS", "FINAL", "POSTPONED", "CANCELLED", "FINAL_OVERTIME"]
      description: Game status.
    WeeklyGameDetailCategory:
      type: string
      enum: ["MNF", "SNF", "TNF", "OTHER"]
      description: Prime time game designation.
    WeeklyGameDetail:
      type: object
      description: Comprehensive game detail for a specific week.
      properties:
        id:
          type: string
          description: Unique game identifier.
        season:
          type: integer
          description: Season year.
        seasonType:
          $ref: "#/components/schemas/SeasonType"
        week:
          type: integer
          description: Week number.
        status:
          $ref: "#/components/schemas/WeeklyGameDetailStatus"
        category:
          $ref: "#/components/schemas/WeeklyGameDetailCategory"
        date:
          type: string
          description: Game date (YYYY-MM-DD).
        time:
          type: string
          description: Game time in UTC.
        awayTeam:
          type: object
          description: Away team information including score and record.
        homeTeam:
          type: object
          description: Home team information including score and record.
        venue:
          type: object
          description: Venue and stadium information.
        broadcastInfo:
          type: object
          description: Broadcast and network information.
        driveChart:
          type: object
          description: Drive-by-drive data (included when includeDriveChart=true).
        replays:
          type: array
          items:
            type: object
            description: Video replay reference.
          description: Replay video links (included when includeReplays=true).
        awayTeamStandings:
          type: object
          description: Away team standings (included when includeStandings=true).
        homeTeamStandings:
          type: object
          description: Home team standings (included when includeStandings=true).
        summary:
          type: object
          description: Game summary information (included when includeSummary=true).
        taggedVideos:
          type: array
          items:
            type: object
            description: Tagged video content.
          description: Tagged video content (included when includeTaggedVideos=true).
  responses:
    Unauthorized:
      description: Authentication required or token expired.
    NotFound:
      description: The requested resource was not found.
    RateLimited:
      description: Rate limit exceeded. Retry after the indicated period.
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: OAuth2 access token obtained from the authentication endpoint.
security:
  - bearerAuth: []
