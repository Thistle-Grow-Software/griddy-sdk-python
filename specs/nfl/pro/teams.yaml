openapi: "3.1.0"
info:
  title: "NFL.com Pro Teams API"
  version: "1.0.0"
  description: >-
    Reverse-engineered specification for the NFL.com Pro Teams API.
    This spec was derived from the Griddy SDK implementation and may be
    incomplete. The NFL.com API is undocumented and subject to change
    without notice.
servers:
  - url: https://pro.nfl.com
    description: NFL Pro API

paths:
  /api/teams/all:
    get:
      operationId: getAllTeams
      summary: Get All Teams
      description: >-
        Retrieves information for all NFL teams including regular teams and
        Pro Bowl teams. Returns comprehensive team data including colors,
        logos, stadiums, and contact information.
      responses:
        "200":
          description: Information for all NFL teams.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProTeam"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/teams/roster:
    get:
      operationId: getTeamRoster
      summary: Get Team Roster
      description: >-
        Retrieves the complete roster for a specific team and season. Returns
        detailed player information including physical attributes, college
        info, and experience.
      parameters:
        - name: teamId
          in: query
          required: true
          schema:
            type: string
          description: Team identifier (4-digit string).
        - name: season
          in: query
          required: true
          schema:
            type: integer
          description: Season year.
      responses:
        "200":
          description: Complete roster for the specified team and season.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamRosterResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/teams/rosterWeek:
    get:
      operationId: getWeeklyTeamRoster
      summary: Get Weekly Team Roster
      description: >-
        Retrieves the roster for a specific team, season, season type, and
        week. Returns player information with weekly status and availability.
      parameters:
        - name: teamId
          in: query
          required: true
          schema:
            type: string
          description: Team identifier (4-digit string).
        - name: season
          in: query
          required: true
          schema:
            type: integer
          description: Season year.
        - name: seasonType
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/SeasonType"
          description: Type of season.
        - name: week
          in: query
          required: true
          schema:
            type: integer
          description: Week number within the season.
      responses:
        "200":
          description: Roster with weekly status for the specified team and week.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyRosterResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/teams/schedule:
    get:
      operationId: getTeamSchedule
      summary: Get Team Schedule
      description: >-
        Retrieves the complete schedule for a specific team and season.
        Returns all games including preseason, regular season, and postseason
        with scores for completed games.
      parameters:
        - name: teamId
          in: query
          required: true
          schema:
            type: string
          description: Team identifier (4-digit string).
        - name: season
          in: query
          required: true
          schema:
            type: integer
          description: Season year.
      responses:
        "200":
          description: Complete schedule for the specified team and season.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScheduledGame"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/stats/multiple-rankings/all-teams:
    get:
      operationId: getMultipleRankingsAllTeams
      summary: Get Multiple Rankings for All Teams
      description: >-
        Retrieves rankings for all 32 NFL teams across multiple specified
        statistical categories. Allows comparison of teams across up to 5
        different statistics simultaneously.
      parameters:
        - name: season
          in: query
          required: true
          schema:
            type: integer
          description: Season year.
        - name: seasonType
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/SeasonType"
          description: Type of season.
        - name: stat0
          in: query
          required: true
          schema:
            type: string
          description: First statistical category (required).
        - name: stat1
          in: query
          required: false
          schema:
            type: string
          description: Second statistical category.
        - name: stat2
          in: query
          required: false
          schema:
            type: string
          description: Third statistical category.
        - name: stat3
          in: query
          required: false
          schema:
            type: string
          description: Fourth statistical category.
        - name: stat4
          in: query
          required: false
          schema:
            type: string
          description: Fifth statistical category.
      responses:
        "200":
          description: Rankings for all teams across the specified categories.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MultipleRankingsCategory"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

components:
  schemas:
    SeasonType:
      type: string
      enum: ["PRE", "REG", "POST"]
    ProTeam:
      type: object
      description: NFL team information including colors, logos, and stadium.
    TeamRosterResponse:
      type: object
      description: Complete team roster with player details.
    WeeklyRosterResponse:
      type: object
      description: Team roster with weekly player status and availability.
    ScheduledGame:
      type: object
      description: Scheduled game with teams, venue, and scores.
    MultipleRankingsCategory:
      type: object
      description: Team rankings for a statistical category.
  responses:
    Unauthorized:
      description: Authentication required or token expired.
    NotFound:
      description: The requested resource was not found.
    RateLimited:
      description: Rate limit exceeded.
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: OAuth2 access token from the authentication endpoint.

security:
  - bearerAuth: []
