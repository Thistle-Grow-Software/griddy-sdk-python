components:
  parameters:
    Season:
      name: season
      in: query
      required: true
      schema:
        type: integer
      description: Season year.
    SeasonTypeParam:
      name: seasonType
      in: query
      required: true
      schema:
        $ref: "#/components/schemas/SeasonType"
      description: Type of season.
    Week:
      name: week
      in: query
      required: true
      schema:
        type: string
      description: Week identifier slug.
    Limit35:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 35
      description: Maximum number of results to return.
    Limit50:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 50
      description: Maximum number of results to return.
    Offset:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        default: 0
      description: Number of records to skip for pagination.
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        default: 1
      description: Page number for pagination.
    SortKey:
      name: sortKey
      in: query
      required: false
      schema:
        type: string
      description: Field to sort results by.
    SortValue:
      name: sortValue
      in: query
      required: false
      schema:
        $ref: "#/components/schemas/SortOrder"
      description: Sort direction.

  schemas:
    SeasonType:
      type: string
      enum: ["PRE", "REG", "POST"]
    SortOrder:
      type: string
      enum: ["ASC", "DESC"]
    WeeklyPassingStatsResponse:
      type: object
      description: Player passing statistics for a specific week.
    PassingStatsResponse:
      type: object
      description: Player passing statistics for a season.
    ReceivingStatsResponse:
      type: object
      description: Player receiving statistics.
    WeeklyRushingStatsResponse:
      type: object
      description: Player rushing statistics for a specific week.
    RushingStatsResponse:
      type: object
      description: Player rushing statistics for a season.
    DefensiveOverviewStatsResponse:
      type: object
      description: Defensive player overview statistics.
    PassRushStatsResponse:
      type: object
      description: Defensive pass rush statistics.
    NearestDefenderStatsResponse:
      type: object
      description: Nearest defender statistics.
    FantasyStatsResponse:
      type: object
      description: Fantasy football statistics.
    TeamDefenseStatsResponse:
      type: object
      description: Team-level defensive overview statistics.
    TeamDefensePassStatsResponse:
      type: object
      description: Team-level defensive pass statistics.
    TeamDefenseRushStatsResponse:
      type: object
      description: Team-level defensive rush statistics.
    TeamOffenseStatsResponse:
      type: object
      description: Team-level offensive overview statistics.
    TeamOffensePassStatsResponse:
      type: object
      description: Team-level offensive pass statistics.
    TeamOffenseRushStatsResponse:
      type: object
      description: Team-level offensive rush statistics.

  responses:
    Unauthorized:
      description: Authentication required or token expired.
    NotFound:
      description: The requested resource was not found.
    RateLimited:
      description: Rate limit exceeded.

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: OAuth2 access token from the authentication endpoint.

security:
  - bearerAuth: []
