openapi: "3.1.0"
info:
  title: "NFL.com Pro Stats API"
  version: "1.0.0"
  description: >-
    Reverse-engineered specification for the NFL.com Pro Stats API.
    This spec was derived from the Griddy SDK implementation and may be
    incomplete. The NFL.com API is undocumented and subject to change
    without notice. All endpoints under /api/secured/* require NFL Pro
    Access.
servers:
  - url: https://pro.nfl.com
    description: NFL Pro API

paths:
  # ---------------------------------------------------------------------------
  # Player Offense — Passing
  # ---------------------------------------------------------------------------
  /api/secured/stats/players-offense/passing/week:
    get:
      operationId: getPlayerPassingStatsByWeek
      summary: Get Player Passing Statistics by Week
      description: >-
        Retrieves comprehensive passing statistics for NFL players during a
        specified week and season. Requires NFL Pro Access.
      parameters:
        - $ref: "#/components/parameters/Season"
        - $ref: "#/components/parameters/SeasonTypeParam"
        - $ref: "#/components/parameters/Week"
        - $ref: "#/components/parameters/Limit50"
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/SortKey"
        - $ref: "#/components/parameters/SortValue"
        - name: qualifiedPasser
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: Filter to only qualified passers (minimum attempts threshold).
        - name: teamOffense
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: Filter by specific team IDs.
      responses:
        "200":
          description: Player passing statistics for the specified week.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyPassingStatsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/secured/stats/players-offense/passing/season:
    get:
      operationId: getPlayerPassingStatsBySeason
      summary: Get Player Passing Statistics by Season
      description: >-
        Retrieves comprehensive passing statistics for NFL players during a
        specified season. Requires NFL Pro Access.
      parameters:
