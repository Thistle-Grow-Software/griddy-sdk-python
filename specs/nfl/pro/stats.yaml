        - $ref: "#/components/parameters/SeasonTypeParam"
        - $ref: "#/components/parameters/Limit35"
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/SortKey"
        - $ref: "#/components/parameters/SortValue"
        - name: qualifiedPasser
          in: query
          required: false
          schema:
            type: boolean
            default: true
          description: Filter to only qualified passers (minimum attempts threshold).
        - name: teamOffense
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: Filter by specific team IDs.
      responses:
        "200":
          description: Player passing statistics for the specified season.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PassingStatsResponse"
        "401":
