  /api/secured/stats/fantasy/season:
    get:
      operationId: getFantasyStatsBySeason
      summary: Get Fantasy Football Statistics by Season
      description: >-
        Retrieves comprehensive fantasy football statistics for NFL players
        during a specified season. Supports filtering by position groups,
        teams, minimum snap thresholds, and rolling N-week windows. Requires
        NFL Pro Access.
      parameters:
        - $ref: "#/components/parameters/Season"
        - $ref: "#/components/parameters/SeasonTypeParam"
        - $ref: "#/components/parameters/Limit35"
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/SortKey"
        - $ref: "#/components/parameters/SortValue"
        - name: positionGroup
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
              enum: ["QB", "RB", "WR", "TE", "SPEC"]
          description: Filter by position groups.
        - name: teamOffense
          in: query
          required: false
          schema:
            type: string
          description: Filter by specific offensive team ID.
        - name: teamDefense
          in: query
          required: false
          schema:
            type: string
          description: Filter by specific defensive team ID (opponent analysis).
        - name: minOffensiveSnaps
          in: query
          required: false
          schema:
            type: integer
            default: 0
          description: Minimum offensive snaps threshold for inclusion.
        - name: lastNWeeks
          in: query
          required: false
          schema:
            type: integer
          description: Number of recent weeks to analyze (rolling window).
      responses:
        "200":
          description: Fantasy football statistics for the specified season.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FantasyStatsResponse"
