openapi: "3.1.0"
info:
  title: "NFL.com Pro Betting API"
  version: "1.0.0"
  description: >-
    Reverse-engineered specification for the NFL.com Pro Betting API.
    This spec was derived from the Griddy SDK implementation and may be
    incomplete. The NFL.com API is undocumented and subject to change
    without notice.
servers:
  - url: https://pro.nfl.com
    description: NFL Pro API

paths:
  /api/schedules/week/odds:
    get:
      operationId: getWeeklyBettingOdds
      summary: Get Weekly Betting Odds
      description: >-
        Retrieves comprehensive betting odds for all games in a specified week.
        Returns point spreads, money lines, and totals (over/under) for each
        game with the latest odds updates from betting markets.
      parameters:
        - name: season
          in: query
          required: true
          schema:
            type: integer
          description: Season year.
        - name: seasonType
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/SeasonType"
          description: Type of season.
        - name: week
          in: query
          required: true
          schema:
            type: integer
          description: Week number within the season.
      responses:
        "200":
          description: Betting odds for all games in the specified week.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyOddsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

components:
  schemas:
    SeasonType:
      type: string
      enum: ["PRE", "REG", "POST"]
    SortOrder:
      type: string
      enum: ["ASC", "DESC"]
    WeeklyOddsResponse:
      type: object
      description: Contains betting odds for all games in a week.
      properties:
        games:
          type: array
          items:
            type: object
            description: Game with associated betting odds.
  responses:
    Unauthorized:
      description: Authentication required or token expired.
    NotFound:
      description: The requested resource was not found.
    RateLimited:
      description: Rate limit exceeded.
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: OAuth2 access token from the authentication endpoint.

security:
  - bearerAuth: []
