openapi: "3.1.0"
info:
  title: "NFL.com Pro Players API"
  version: "1.0.0"
  description: >-
    Reverse-engineered specification for the NFL.com Pro Players API.
    This spec was derived from the Griddy SDK implementation and may be
    incomplete. The NFL.com API is undocumented and subject to change
    without notice.
servers:
  - url: https://pro.nfl.com
    description: NFL Pro API

paths:
  /api/players/player:
    get:
      operationId: getPlayer
      summary: Get Player Details
      description: >-
        Retrieves detailed information about a specific NFL player including
        physical attributes, team information, draft details, and current
        status.
      parameters:
        - name: nflId
          in: query
          required: true
          schema:
            type: integer
          description: NFL player identifier.
      responses:
        "200":
          description: Detailed player information.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/players/projectedStats:
    get:
      operationId: getProjectedStats
      summary: Get Projected Player Statistics
      description: >-
        Retrieves projected fantasy statistics for players based on team,
        season, and week. Returns data in JSON:API format with relationships
        between players and their projected stats.
      parameters:
        - name: season
          in: query
          required: true
          schema:
            type: integer
          description: Season year.
        - name: week
          in: query
          required: true
          schema:
            type: integer
          description: Week number within the season.
        - name: filterNflTeamId
          in: query
          required: false
          schema:
            type: string
          description: Filter by NFL team ID (UUID format).
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            default: 20
          description: Number of results per page.
      responses:
        "200":
          description: Projected fantasy statistics for the specified parameters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectedStatsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/players/search:
    get:
      operationId: searchPlayers
      summary: Search Players
      description: >-
        Searches for NFL players by name or term. Returns a list of players
        matching the search criteria including both active and retired players.
      parameters:
        - name: term
          in: query
          required: true
          schema:
            type: string
          description: Search term for player name (first or last name).
      responses:
        "200":
          description: Players matching the search criteria.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerSearchResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

components:
  schemas:
    PlayerDetail:
      type: object
      description: Detailed NFL player information.
    ProjectedStatsResponse:
      type: object
      description: Projected fantasy statistics in JSON:API format.
    PlayerSearchResponse:
      type: object
      description: List of players matching search criteria.
  responses:
    Unauthorized:
      description: Authentication required or token expired.
    NotFound:
      description: The requested resource was not found.
    RateLimited:
      description: Rate limit exceeded.
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: OAuth2 access token from the authentication endpoint.

security:
  - bearerAuth: []
