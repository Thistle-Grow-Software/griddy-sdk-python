openapi: "3.1.0"
info:
  title: "NFL.com Pro Transactions API"
  version: "1.0.0"
  description: >-
    Reverse-engineered specification for the NFL.com Pro Transactions API.
    This spec was derived from the Griddy SDK implementation and may be
    incomplete. The NFL.com API is undocumented and subject to change
    without notice.
servers:
  - url: https://pro.nfl.com
    description: NFL Pro API

paths:
  /api/teams/transactions:
    get:
      operationId: getTransactions
      summary: Get Transactions
      description: >-
        Retrieves recent transactions including trades, signings, releases,
        practice squad moves, and injured reserve designations for a
        specified month and year.
      parameters:
        - name: month
          in: query
          required: true
          schema:
            type: integer
          description: Month number to fetch transactions for.
        - name: year
          in: query
          required: true
          schema:
            type: integer
          description: Year (four digits) to fetch transactions for.
        - name: teamId
          in: query
          required: false
          schema:
            type: string
          description: Team UUID string to filter by.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
          description: Maximum number of results.
      responses:
        "200":
          description: Recent player transactions for the specified period.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

components:
  schemas:
    TransactionsResponse:
      type: object
      description: Collection of player transactions.
  responses:
    Unauthorized:
      description: Authentication required or token expired.
    NotFound:
      description: The requested resource was not found.
    RateLimited:
      description: Rate limit exceeded.
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: OAuth2 access token from the authentication endpoint.

security:
  - bearerAuth: []
